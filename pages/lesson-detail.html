<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درس - Pixel</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="../index.html" class="logo">
            <span>Pixel</span><span>.</span>
        </a>
        <ul class="nav-links">
            <li><a href="../index.html#levels">المسارات</a></li>
            <li><a href="placement-test.html">تحديد المستوى</a></li>
        </ul>
    </nav>

    <!-- Content -->
    <div class="container" style="padding: 3rem 5%; max-width: 800px;">
        <div style="margin-bottom: 2rem;">
            <a href="levels.html" class="btn btn-secondary">العودة للمسارات</a>
        </div>

        <div class="quiz-container">
            <h1 id="lesson-title">درس تعليمي</h1>
            
            <div id="lesson-content" style="margin: 2rem 0; line-height: 1.8; color: #475569;">
                <p>محتوى الدرس سيظهر هنا...</p>
            </div>

            <div style="margin-top: 3rem; display: flex; gap: 1rem; flex-wrap: wrap;">
                <a href="quiz.html" class="btn btn-primary">اختبر معلوماتك</a>
                <a href="levels.html" class="btn btn-secondary">العودة</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p><strong>Pixel Platform</strong> - منصة تعليمية متخصصة في تصميم UI/UX</p>
        </div>
    </footer>

    <script>
        const lessons = {
            beginner: [
                { title: "مقدمة إلى UI/UX", content: "تعلم الفرق بين UI و UX وأهمية كل منهما في التصميم الحديث." },
                { title: "أساسيات الألوان", content: "فهم نظرية الألوان وكيفية اختيار الألوان المناسبة للتصميم." }
            ],
            intermediate: [
                { title: "التصميم المتجاوب", content: "تعلم كيفية تصميم واجهات تعمل على جميع الأجهزة." },
                { title: "تجربة المستخدم", content: "فهم احتياجات المستخدم وكيفية تحسين تجربته." }
            ],
            advanced: [
                { title: "التصميم المتقدم", content: "تقنيات متقدمة في تصميم الواجهات والتفاعلات." },
                { title: "الاختبار والتحسين", content: "كيفية اختبار التصاميم وتحسينها بناءً على ملاحظات المستخدمين." }
            ]
        };

        function loadLesson() {
            const params = new URLSearchParams(window.location.search);
            const level = params.get('level') || 'beginner';
            const lessonNum = parseInt(params.get('lesson')) || 1;

            const lesson = lessons[level] && lessons[level][lessonNum - 1];
            
            if (lesson) {
                document.getElementById('lesson-title').textContent = lesson.title;
                document.getElementById('lesson-content').innerHTML = `<p>${lesson.content}</p>`;
            }
        }

        loadLesson();
    </script>
</body>
</html>
