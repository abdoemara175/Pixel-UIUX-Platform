<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درس - Pixel</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .lesson-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        .sidebar {
            background: #f8fafc;
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            height: fit-content;
        }
        .sidebar h4 {
            margin-bottom: 1rem;
            color: #1e293b;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 0.5rem;
        }
        .lesson-list {
            list-style: none;
            padding: 0;
        }
        .lesson-list li {
            margin-bottom: 0.5rem;
        }
        .lesson-list a {
            text-decoration: none;
            color: #64748b;
            display: block;
            padding: 0.5rem;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .lesson-list a:hover, .lesson-list a.active {
            background: #3b82f6;
            color: white;
        }
        .lesson-content-area {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .lesson-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e2e8f0;
        }
        @media (max-width: 768px) {
            .lesson-layout {
                grid-template-columns: 1fr;
            }
            .sidebar {
                order: 2;
            }
            .lesson-content-area {
                order: 1;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="../index.html" class="logo">
            <span>Pixel</span><span>.</span>
        </a>
        <ul class="nav-links">
            <li><a href="../index.html">الرئيسية</a></li>
            <li><a href="../index.html#levels">المسارات</a></li>
            <li><a href="placement-test.html">تحديد المستوى</a></li>
            <li><a href="../index.html#features">المميزات</a></li>
        </ul>
    </nav>

    <!-- Content -->
    <div class="container" style="padding: 3rem 5%;">
        <div style="margin-bottom: 1rem;">
            <a id="back-link" href="levels.html" class="btn btn-secondary">العودة للمسار</a>
        </div>

        <div class="lesson-layout">
            <!-- Sidebar -->
            <aside class="sidebar">
                <h4 id="sidebar-title">قائمة الدروس</h4>
                <ul class="lesson-list" id="lesson-list">
                    <!-- Lessons will be loaded here -->
                </ul>
            </aside>

            <!-- Main Content -->
            <main class="lesson-content-area">
                <h1 id="lesson-title">جاري التحميل...</h1>
                <div id="lesson-content" style="margin: 2rem 0; line-height: 1.8; color: #475569;">
                    <p>محتوى الدرس سيظهر هنا...</p>
                </div>

                <div class="lesson-nav">
                    <a id="prev-lesson" href="#" class="btn btn-secondary" style="visibility: hidden;">الدرس السابق</a>
                    <a id="quiz-link" href="quiz.html" class="btn btn-primary">اختبر معلوماتك</a>
                    <a id="next-lesson" href="#" class="btn btn-secondary" style="visibility: hidden;">الدرس التالي</a>
                </div>
            </main>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p><strong>Pixel Platform</strong> - منصة تعليمية متخصصة في تصميم UI/UX</p>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script>
        function loadLesson() {
            const params = new URLSearchParams(window.location.search);
            const levelKey = params.get('level') || 'beginner';
            const lessonId = parseInt(params.get('lesson')) || 1;

            const level = pixelData.levels[levelKey];
            if (!level) return;

            const lessonIndex = level.lessons.findIndex(l => l.id === lessonId);
            const lesson = level.lessons[lessonIndex];

            if (lesson) {
                document.title = `${lesson.title} - Pixel`;
                document.getElementById('lesson-title').textContent = lesson.title;
                document.getElementById('lesson-content').innerHTML = lesson.content;
                document.getElementById('sidebar-title').textContent = level.title;
                document.getElementById('back-link').href = `levels.html?level=${levelKey}`;
                document.getElementById('quiz-link').href = `quiz.html?level=${levelKey}&lesson=${lessonId}`;

                // Load Sidebar
                const list = document.getElementById('lesson-list');
                list.innerHTML = '';
                level.lessons.forEach(l => {
                    const li = document.createElement('li');
                    const a = document.createElement('a');
                    a.href = `lesson-detail.html?level=${levelKey}&lesson=${l.id}`;
                    a.textContent = l.title;
                    if (l.id === lessonId) a.className = 'active';
                    li.appendChild(a);
                    list.appendChild(li);
                });

                // Navigation Buttons
                const prevBtn = document.getElementById('prev-lesson');
                const nextBtn = document.getElementById('next-lesson');

                if (lessonIndex > 0) {
                    prevBtn.href = `lesson-detail.html?level=${levelKey}&lesson=${level.lessons[lessonIndex - 1].id}`;
                    prevBtn.style.visibility = 'visible';
                } else {
                    prevBtn.style.visibility = 'hidden';
                }

                if (lessonIndex < level.lessons.length - 1) {
                    nextBtn.href = `lesson-detail.html?level=${levelKey}&lesson=${level.lessons[lessonIndex + 1].id}`;
                    nextBtn.style.visibility = 'visible';
                } else {
                    nextBtn.style.visibility = 'hidden';
                }
            }
        }

        window.onload = loadLesson;
    </script>
</body>
</html>
