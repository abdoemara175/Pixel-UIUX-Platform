<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel | اختبار تحديد المستوى</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Kufi Arabic', sans-serif; }
        .progress-container { width: 100%; height: 6px; background: #1f1f1f; border-radius: 10px; margin-bottom: 3rem; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--secondary); width: 0%; transition: width 0.5s ease; box-shadow: 0 0 15px var(--secondary); }
    </style>
</head>
<body>
    <nav class="navbar animate-up">
        <div class="logo">Pixel<span>.</span></div>
        <ul class="nav-links">
            <li><a href="../index.html">الرئيسية</a></li>
            <li><a href="levels.html">المستويات</a></li>
            <li><a href="placement-test.html" class="active">تحديد المستوى</a></li>
        </ul>
        <a href="../index.html" class="btn btn-outline">إلغاء</a>
    </nav>

    <header class="hero" style="padding: 6rem 8% 4rem;">
        <div class="container">
            <h1 class="animate-up">اختبار <span style="color: var(--secondary);">تحديد المستوى</span></h1>
            <p class="animate-up" style="animation-delay: 0.2s;">دعنا نكتشف مهاراتك الحالية لنضعك في المسار الصحيح.</p>
        </div>
    </header>

    <main class="container">
        <div class="quiz-container animate-up" style="animation-delay: 0.4s; position: relative;">
            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>

            <div id="quiz-content">
                <h2 id="question-text" style="margin-bottom: 2.5rem; font-size: 1.8rem; color: var(--white);">جاري التحميل...</h2>
                <div id="options-container">
                    <!-- Options injected via JS -->
                </div>
            </div>

            <div id="quiz-footer" style="margin-top: 4rem; display: flex; justify-content: space-between; align-items: center;">
                <span id="question-counter" style="color: var(--text-muted); font-weight: 600;">السؤال 1 من 4</span>
                <button id="next-btn" class="btn" style="display: none;">التالي</button>
            </div>

            <div id="result-screen" style="display: none; text-align: center; padding: 2rem 0;">
                <div id="result-icon" style="font-size: 6rem; margin-bottom: 2rem;">🚀</div>
                <h2 id="result-title" style="font-size: 2.5rem; margin-bottom: 1.5rem;">تحليل مستواك</h2>
                <p id="result-desc" style="font-size: 1.3rem; color: var(--text-muted); margin-bottom: 3rem; max-width: 600px; margin-left: auto; margin-right: auto;"></p>
                <div style="display: flex; gap: 1.5rem; justify-content: center;">
                    <a href="levels.html" id="recommendation-btn" class="btn">ابدأ رحلتك التعليمية</a>
                    <a href="../index.html" class="btn btn-outline">العودة للرئيسية</a>
                </div>
            </div>
        </div>
    </main>

    <footer style="margin-top: 10rem; padding: 3rem; text-align: center;">
        <p style="color: var(--text-muted);">&copy; 2026 Pixel Platform - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        const questions = [
            { q: "ما هو مفهومك عن تجربة المستخدم (UX)؟", options: ["مجرد ألوان وأشكال جذابة", "عملية تصميم تهدف لتسهيل حياة المستخدم وحل مشاكله", "برنامج يستخدم لرسم المواقع", "لا أعرف شيئاً عنها"], correct: -1 },
            { q: "هل سبق لك استخدام أدوات تصميم مثل Figma أو Adobe XD؟", options: ["نعم، بشكل محترف", "نعم، بشكل بسيط", "سمعت عنها فقط", "لا أبداً"], correct: -1 },
            { q: "ما هي أهمية الخطوط والألوان في واجهة المستخدم (UI)؟", options: ["للتزيين فقط", "لجذب الانتباه دون هدف", "لتحسين الوضوح، التسلسل البصري، وتوجيه المستخدم", "لا أهمية لها"], correct: -1 },
            { q: "هل تعرف الفرق بين الـ Wireframe والـ Prototype؟", options: ["نعم، الفرق واضح تماماً لي", "أعرف القليل", "أعتقد أنهما نفس الشيء", "لا أعرف"], correct: -1 }
        ];

        let currentIdx = 0;
        let selections = [];

        function loadQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('question-counter').innerText = `السؤال ${currentIdx + 1} من ${questions.length}`;
            document.getElementById('progress').style.width = `${((currentIdx) / questions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerHTML = `<span>${idx + 1}</span> <strong>${opt}</strong>`;
                div.onclick = () => selectOption(idx, div);
                container.appendChild(div);
            });
            document.getElementById('next-btn').style.display = 'none';
        }

        function selectOption(idx, element) {
            const options = document.querySelectorAll('.option');
            options.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selections[currentIdx] = idx;
            document.getElementById('next-btn').style.display = 'inline-flex';
            if (currentIdx === questions.length - 1) {
                document.getElementById('next-btn').innerText = 'عرض النتيجة';
            }
        }

        document.getElementById('next-btn').onclick = () => {
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        };

        function showResult() {
            document.getElementById('progress').style.width = '100%';
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('quiz-footer').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            const firstChoice = selections[0];
            const secondChoice = selections[1];
            let level = "";
            let recommendation = "";

            if (firstChoice === 1 && secondChoice <= 1) {
                level = "متوسط / متقدم";
                recommendation = "لديك أساسيات جيدة جداً! ننصحك بالبدء بمسار 'تصميم النماذج التفاعلية' لتعزيز مهاراتك العملية.";
            } else {
                level = "مبتدئ";
                recommendation = "أهلاً بك في عالم التصميم! ننصحك بالبدء بمسار 'أساسيات UI/UX' لبناء قاعدة معرفية ومهارية قوية.";
            }

            document.getElementById('result-title').innerText = `مستواك المقترح: ${level}`;
            document.getElementById('result-desc').innerText = recommendation;
        }

        loadQuestion();
    </script>
</body>
</html>
