<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel | اختبار تحديد المستوى</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Kufi Arabic', sans-serif; }
        .progress-bar { height: 12px; background: var(--border-soft); border-radius: 100px; margin-bottom: 3rem; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--secondary); width: 0%; transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); box-shadow: 0 0 20px var(--secondary-light); }
        .option-card { padding: 1.5rem 2rem; border-radius: 24px; border: 2px solid var(--border-soft); margin-bottom: 1.2rem; cursor: pointer; transition: var(--transition-smooth); display: flex; align-items: center; gap: 1.5rem; background: white; font-weight: 700; font-size: 1.1rem; color: var(--text-slate); }
        .option-card:hover { border-color: var(--secondary); background: var(--secondary-light); color: var(--secondary); transform: translateX(-10px); }
        .option-card.selected { border-color: var(--secondary); background: var(--secondary); color: white; box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3); }
        .option-index { width: 32px; height: 32px; background: var(--border-soft); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: var(--transition-smooth); }
        .option-card.selected .option-index { background: rgba(255,255,255,0.2); color: white; }
    </style>
</head>
<body>
    <nav class="navbar reveal">
        <div class="logo">
            <div class="logo-dot"></div>
            Pixel<span>.</span>
        </div>
        <ul class="nav-links">
            <li><a href="../index.html">الرئيسية</a></li>
            <li><a href="levels.html">المسارات</a></li>
            <li><a href="placement-test.html" class="active">تحديد المستوى</a></li>
        </ul>
        <a href="../index.html" class="btn-ghost" style="padding: 0.8rem 1.5rem; font-size: 0.9rem;">إلغاء</a>
    </nav>

    <main class="container reveal" style="max-width: 900px; margin-top: 6rem; padding-bottom: 10rem;">
        <div class="content-wrapper">
            <div class="progress-bar">
                <div id="progress" class="progress-fill"></div>
            </div>

            <div id="quiz-content">
                <div id="question-header" style="margin-bottom: 3rem;">
                    <span id="question-counter" style="color: var(--secondary); font-weight: 900; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px;">السؤال 1 من 4</span>
                    <h2 id="question-text" style="margin-top: 1rem; font-size: 2.2rem; font-weight: 900; line-height: 1.3;">جاري التحميل...</h2>
                </div>
                
                <div id="options-container">
                    <!-- Options injected via JS -->
                </div>

                <div style="margin-top: 4rem; display: flex; justify-content: flex-end;">
                    <button id="next-btn" class="btn-main" style="display: none;">السؤال التالي ➔</button>
                </div>
            </div>

            <div id="result-screen" style="display: none; text-align: center;">
                <div style="font-size: 5rem; margin-bottom: 2rem;">🌟</div>
                <h2 id="result-title" style="font-size: 2.8rem; font-weight: 900; margin-bottom: 1.5rem;">تحليل مستواك</h2>
                <p id="result-desc" style="font-size: 1.4rem; color: var(--text-slate); margin-bottom: 3.5rem; max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.8;"></p>
                <div style="display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;">
                    <a href="levels.html" class="btn-main">استكشف مسارك التعليمي</a>
                    <a href="../index.html" class="btn-ghost">العودة للرئيسية</a>
                </div>
            </div>
        </div>
    </main>

    <script>
        const questions = [
            { q: "ما هو مفهومك عن تجربة المستخدم (UX)؟", options: ["مجرد ألوان وأشكال جذابة", "عملية تصميم تهدف لتسهيل حياة المستخدم وحل مشاكله", "برنامج يستخدم لرسم المواقع", "لا أعرف شيئاً عنها"] },
            { q: "هل سبق لك استخدام أدوات تصميم مثل Figma أو Adobe XD؟", options: ["نعم، بشكل محترف", "نعم، بشكل بسيط", "سمعت عنها فقط", "لا أبداً"] },
            { q: "ما هي أهمية الخطوط والألوان في واجهة المستخدم (UI)؟", options: ["للتزيين فقط", "لجذب الانتباه دون هدف", "لتحسين الوضوح، التسلسل البصري، وتوجيه المستخدم", "لا أهمية لها"] },
            { q: "هل تعرف الفرق بين الـ Wireframe والـ Prototype؟", options: ["نعم، الفرق واضح تماماً لي", "أعرف القليل", "أعتقد أنهما نفس الشيء", "لا أعرف"] }
        ];

        let currentIdx = 0;
        let selections = [];

        function loadQuestion() {
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('question-counter').innerText = `السؤال ${currentIdx + 1} من ${questions.length}`;
            document.getElementById('progress').style.width = `${((currentIdx) / questions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option-card';
                div.innerHTML = `<div class="option-index">${String.fromCharCode(65 + idx)}</div> <div>${opt}</div>`;
                div.onclick = () => selectOption(idx, div);
                container.appendChild(div);
            });
            document.getElementById('next-btn').style.display = 'none';
        }

        function selectOption(idx, element) {
            const options = document.querySelectorAll('.option-card');
            options.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            selections[currentIdx] = idx;
            document.getElementById('next-btn').style.display = 'inline-flex';
            if (currentIdx === questions.length - 1) {
                document.getElementById('next-btn').innerText = 'عرض النتيجة النهائية';
            }
        }

        document.getElementById('next-btn').onclick = () => {
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        };

        function showResult() {
            document.getElementById('progress').style.width = '100%';
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            const firstChoice = selections[0];
            const secondChoice = selections[1];
            let level = "";
            let recommendation = "";

            if (firstChoice === 1 && secondChoice <= 1) {
                level = "متوسط / متقدم";
                recommendation = "أنت تمتلك مهارات واعدة! نوصيك بالانطلاق فوراً في مسارات التصميم التفاعلي المتقدمة لتعزيز قدراتك العملية.";
            } else {
                level = "مبتدئ";
                recommendation = "بداية رائعة! نوصيك بالبدء بمسار 'أساسيات UI/UX' لبناء قاعدة معرفية ومهارية صلبة ومستدامة.";
            }

            document.getElementById('result-title').innerText = `مستواك المقترح: ${level}`;
            document.getElementById('result-desc').innerText = recommendation;
        }

        loadQuestion();
    </script>
</body>
</html>
