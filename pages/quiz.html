<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار الدرس - Pixel</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="../index.html" class="logo">
            <span>Pixel</span><span>.</span>
        </a>
        <ul class="nav-links">
            <li><a href="../index.html#levels">المسارات</a></li>
            <li><a href="placement-test.html">تحديد المستوى</a></li>
        </ul>
    </nav>

    <!-- Quiz Container -->
    <div class="container">
        <div class="quiz-container">
            <h2 id="quiz-title" style="margin-bottom: 1.5rem; text-align: center;">اختبار الدرس</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>

            <div class="question" id="question-container">
                <h3 id="question-text">جاري تحميل الأسئلة...</h3>
                <div class="options" id="options-container"></div>
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display: none;">السؤال التالي</button>
                <button class="btn btn-primary" id="submit-btn" onclick="submitQuiz()" style="display: none;">إنهاء الاختبار</button>
                <div id="quiz-result-actions" style="display: none; margin-top: 1rem; gap: 1rem; justify-content: center;">
                    <a id="back-to-lesson" href="#" class="btn btn-secondary">العودة للدرس</a>
                    <a id="next-lesson-link" href="#" class="btn btn-primary">الدرس التالي</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p><strong>Pixel Platform</strong> - منصة تعليمية متخصصة في تصميم UI/UX</p>
        </div>
    </footer>

    <script src="../js/data.js"></script>
    <script>
        let questions = [];
        let currentQuestion = 0;
        let score = 0;
        let selectedAnswers = [];
        let levelKey, lessonId;

        function initQuiz() {
            const params = new URLSearchParams(window.location.search);
            levelKey = params.get('level') || 'beginner';
            lessonId = parseInt(params.get('lesson')) || 1;

            const level = pixelData.levels[levelKey];
            const lessonIndex = level ? level.lessons.findIndex(l => l.id === lessonId) : -1;
            const lesson = lessonIndex !== -1 ? level.lessons[lessonIndex] : null;

            if (lesson && lesson.quiz) {
                questions = lesson.quiz;
                document.getElementById('quiz-title').textContent = `اختبار: ${lesson.title}`;
                document.getElementById('back-to-lesson').href = `lesson-detail.html?level=${levelKey}&lesson=${lessonId}`;
                
                // Setup next lesson link
                if (lessonIndex < level.lessons.length - 1) {
                    const nextLesson = level.lessons[lessonIndex + 1];
                    document.getElementById('next-lesson-link').href = `lesson-detail.html?level=${levelKey}&lesson=${nextLesson.id}`;
                    document.getElementById('next-lesson-link').style.display = 'inline-block';
                } else {
                    document.getElementById('next-lesson-link').style.display = 'none';
                }

                loadQuestion();
            } else {
                document.getElementById('question-text').textContent = "لا يوجد اختبار لهذا الدرس حالياً.";
            }
        }

        function loadQuestion() {
            const question = questions[currentQuestion];
            document.getElementById("question-text").textContent = question.question;
            
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement("div");
                optionDiv.className = "option";
                if (selectedAnswers[currentQuestion] === index) optionDiv.classList.add("selected");
                optionDiv.textContent = option;
                optionDiv.onclick = () => selectOption(index, optionDiv);
                optionsContainer.appendChild(optionDiv);
            });

            updateProgress();
            updateButtons();
        }

        function selectOption(index, element) {
            document.querySelectorAll(".option").forEach(opt => opt.classList.remove("selected"));
            element.classList.add("selected");
            selectedAnswers[currentQuestion] = index;
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById("progress").style.width = progress + "%";
        }

        function updateButtons() {
            const nextBtn = document.getElementById("next-btn");
            const submitBtn = document.getElementById("submit-btn");
            
            if (currentQuestion < questions.length - 1) {
                nextBtn.style.display = "inline-block";
                submitBtn.style.display = "none";
            } else {
                nextBtn.style.display = "none";
                submitBtn.style.display = "inline-block";
            }
        }

        function nextQuestion() {
            if (selectedAnswers[currentQuestion] !== undefined) {
                currentQuestion++;
                loadQuestion();
            } else {
                alert("يرجى اختيار إجابة");
            }
        }

        function submitQuiz() {
            if (selectedAnswers[currentQuestion] === undefined) {
                alert("يرجى اختيار إجابة");
                return;
            }

            score = 0;
            questions.forEach((question, index) => {
                if (selectedAnswers[index] === question.correct) {
                    score++;
                }
            });

            const percentage = (score / questions.length) * 100;
            let message = `نتيجتك: ${score}/${questions.length} (${percentage}%)\n`;
            
            if (percentage >= 80) message += "ممتاز! لقد أتقنت هذا الدرس.";
            else if (percentage >= 50) message += "جيد، ولكن يمكنك مراجعة الدرس مرة أخرى.";
            else message += "تحتاج لمراجعة الدرس جيداً قبل الانتقال للدرس التالي.";

            alert(message);
            document.getElementById('quiz-result-actions').style.display = 'flex';
            document.getElementById('submit-btn').style.display = 'none';
        }

        window.onload = initQuiz;
    </script>
</body>
</html>
