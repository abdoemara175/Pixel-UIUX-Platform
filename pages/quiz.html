<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel | الاختبار التقييمي</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Kufi Arabic', sans-serif; }
        .progress-container { width: 100%; height: 8px; background: #1f1f1f; border-radius: 10px; margin-bottom: 3rem; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--secondary); width: 0%; transition: width 0.5s ease; box-shadow: 0 0 15px var(--secondary); }
        .quiz-option { cursor: pointer; border: 2px solid #2a2a2a; border-radius: 16px; padding: 1.2rem; margin-bottom: 1rem; transition: var(--transition); display: flex; align-items: center; gap: 1rem; background: #1a1a1a; }
        .quiz-option:hover { border-color: var(--secondary); background: #251a3a; }
        .quiz-option.selected { border-color: var(--secondary); background: var(--secondary); color: white; }
        .quiz-option.correct { border-color: #10b981; background: #064e3b; color: white; }
        .quiz-option.wrong { border-color: #ef4444; background: #7f1d1d; color: white; }
    </style>
</head>
<body>
    <nav class="navbar animate-up">
        <div class="logo">Pixel<span>.</span></div>
        <ul class="nav-links">
            <li><a href="../index.html">الرئيسية</a></li>
            <li><a href="levels.html">المستويات</a></li>
            <li><a href="quiz.html" class="active">الاختبارات</a></li>
        </ul>
        <a href="../index.html" class="btn btn-outline">إنهاء</a>
    </nav>

    <header class="hero" style="padding: 4rem 8% 2rem;">
        <div class="container">
            <h1 class="animate-up">الاختبار <span style="color: var(--secondary);">التقييمي</span></h1>
            <p class="animate-up" style="animation-delay: 0.2s;">قياس مدى استيعابك للمهارات والمعارف المكتسبة في هذا الدرس.</p>
        </div>
    </header>

    <main class="container">
        <div class="quiz-container animate-up" style="animation-delay: 0.4s;">
            <div class="progress-container">
                <div id="progress" class="progress-bar"></div>
            </div>
            
            <div id="quiz-content">
                <h2 id="question-text" style="margin-bottom: 2.5rem; font-size: 1.8rem; color: var(--white);">جاري تحميل الأسئلة...</h2>
                <div id="options-container">
                    <!-- Options injected via JS -->
                </div>
            </div>

            <div id="quiz-footer" style="margin-top: 4rem; display: flex; justify-content: space-between; align-items: center;">
                <span id="question-counter" style="color: var(--text-muted); font-weight: 600;">السؤال 1 من 5</span>
                <button id="next-btn" class="btn" style="display: none;">السؤال التالي</button>
            </div>

            <div id="result-screen" style="display: none; text-align: center; padding: 2rem 0;">
                <div id="result-icon" style="font-size: 6rem; margin-bottom: 2rem;">🏆</div>
                <h2 id="result-title" style="font-size: 2.5rem; margin-bottom: 1.5rem;">نتيجة مذهلة!</h2>
                <p id="result-score" style="font-size: 1.8rem; color: var(--secondary); margin-bottom: 3rem;"></p>
                <div style="display: flex; gap: 1.5rem; justify-content: center;">
                    <button onclick="location.reload()" class="btn">إعادة الاختبار</button>
                    <a href="levels.html" class="btn btn-outline">العودة للمستويات</a>
                </div>
            </div>
        </div>
    </main>

    <footer style="margin-top: 10rem; padding: 3rem; text-align: center;">
        <p style="color: var(--text-muted);">&copy; 2026 Pixel Platform - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        const questions = [
            { q: "ما هو الهدف الأساسي من تصميم تجربة المستخدم (UX)؟", options: ["جعل الموقع يبدو جميلاً فقط", "حل مشاكل المستخدم وتسهيل تفاعله مع المنتج", "زيادة عدد الإعلانات في الصفحة", "تصغير حجم الصور"], correct: 1 },
            { q: "أي من هذه العناصر يعتبر جزءاً من واجهة المستخدم (UI)؟", options: ["رحلة المستخدم", "الألوان والخطوط والأيقونات", "مقابلات المستخدمين", "هيكلية المعلومات"], correct: 1 },
            { q: "ماذا تعني المسافات البيضاء (White Space) في التصميم؟", options: ["مساحات فارغة لا فائدة منها", "مساحات تهدف لراحة العين وتوجيه التركيز", "أخطاء في التصميم يجب ملؤها", "خلفية الموقع فقط"], correct: 1 },
            { q: "ما هو الـ Prototype؟", options: ["رسم أولي بسيط جداً", "نموذج تفاعلي يحاكي المنتج النهائي", "كود برمجي للموقع", "اسم أداة تصميم"], correct: 1 },
            { q: "لماذا نستخدم 'شخصيات المستخدم' (Personas)؟", options: ["للتسلية فقط", "لتمثيل فئات المستخدمين الحقيقيين وتصميم حلول لهم", "لاختيار صور للموقع", "لزيادة عدد صفحات المشروع"], correct: 1 }
        ];

        let currentIdx = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            answered = false;
            const q = questions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('question-counter').innerText = `السؤال ${currentIdx + 1} من ${questions.length}`;
            document.getElementById('progress').style.width = `${((currentIdx) / questions.length) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'quiz-option';
                div.innerHTML = `<span>${String.fromCharCode(65 + idx)}</span> <strong>${opt}</strong>`;
                div.onclick = () => selectOption(idx, div);
                container.appendChild(div);
            });
            document.getElementById('next-btn').style.display = 'none';
        }

        function selectOption(idx, element) {
            if (answered) return;
            answered = true;
            const q = questions[currentIdx];
            const options = document.querySelectorAll('.quiz-option');
            
            if (idx === q.correct) {
                element.classList.add('correct');
                score++;
            } else {
                element.classList.add('wrong');
                options[q.correct].classList.add('correct');
            }
            
            document.getElementById('next-btn').style.display = 'inline-flex';
            if (currentIdx === questions.length - 1) {
                document.getElementById('next-btn').innerText = 'عرض النتيجة';
            }
        }

        document.getElementById('next-btn').onclick = () => {
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        };

        function showResult() {
            document.getElementById('progress').style.width = '100%';
            document.getElementById('quiz-content').style.display = 'none';
            document.getElementById('quiz-footer').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            document.getElementById('result-score').innerText = `لقد حصلت على ${score} من أصل ${questions.length}`;
            if (score < 3) {
                document.getElementById('result-icon').innerText = '📚';
                document.getElementById('result-title').innerText = 'تحتاج لمراجعة الدرس مرة أخرى';
            }
        }

        loadQuestion();
    </script>
</body>
</html>
