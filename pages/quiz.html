<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار - Pixel</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <a href="../index.html" class="logo">
            <span>Pixel</span><span>.</span>
        </a>
        <ul class="nav-links">
            <li><a href="../index.html#levels">المسارات</a></li>
            <li><a href="placement-test.html">تحديد المستوى</a></li>
        </ul>
    </nav>

    <!-- Quiz Container -->
    <div class="container">
        <div class="quiz-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress"></div>
            </div>

            <div class="question" id="question-container">
                <h3 id="question-text"></h3>
                <div class="options" id="options-container"></div>
            </div>

            <div style="text-align: center; margin-top: 2rem;">
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display: none;">السؤال التالي</button>
                <button class="btn btn-primary" id="submit-btn" onclick="submitQuiz()" style="display: none;">إنهاء الاختبار</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p><strong>Pixel Platform</strong> - منصة تعليمية متخصصة في تصميم UI/UX</p>
        </div>
    </footer>

    <script>
        const quizQuestions = [
            {
                question: "ما هو الهدف الأساسي من تصميم الواجهات؟",
                options: [
                    "جعل الموقع جميل فقط",
                    "تسهيل استخدام التطبيق",
                    "إضافة الكثير من الألوان",
                    "لا يوجد هدف محدد"
                ],
                correct: 1
            },
            {
                question: "كيف يمكن تحسين تجربة المستخدم؟",
                options: [
                    "إضافة المزيد من الميزات",
                    "فهم احتياجات المستخدم والاستماع لملاحظاته",
                    "استخدام تقنيات حديثة فقط",
                    "لا توجد طريقة"
                ],
                correct: 1
            },
            {
                question: "ما أهمية الـ Whitespace؟",
                options: [
                    "لا أهمية له",
                    "يحسن القراءة والتركيز",
                    "يهدر المساحة",
                    "فقط للتصاميم البسيطة"
                ],
                correct: 1
            },
            {
                question: "ما هو Responsive Design؟",
                options: [
                    "تصميم يستجيب للمستخدم",
                    "تصميم يعمل على جميع أحجام الشاشات",
                    "تصميم سريع",
                    "تصميم تفاعلي فقط"
                ],
                correct: 1
            },
            {
                question: "ما هي أهمية الاختبار في التصميم؟",
                options: [
                    "لا أهمية له",
                    "التأكد من جودة التصميم",
                    "توفير الوقت",
                    "فقط للتطبيقات الكبيرة"
                ],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let selectedAnswers = [];

        function loadQuestion() {
            const question = quizQuestions[currentQuestion];
            document.getElementById("question-text").textContent = question.question;
            
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = "";
            
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement("div");
                optionDiv.className = "option";
                optionDiv.textContent = option;
                optionDiv.onclick = () => selectOption(index, optionDiv);
                optionsContainer.appendChild(optionDiv);
            });

            updateProgress();
            updateButtons();
        }

        function selectOption(index, element) {
            document.querySelectorAll(".option").forEach(opt => opt.classList.remove("selected"));
            element.classList.add("selected");
            selectedAnswers[currentQuestion] = index;
        }

        function updateProgress() {
            const progress = ((currentQuestion + 1) / quizQuestions.length) * 100;
            document.getElementById("progress").style.width = progress + "%";
        }

        function updateButtons() {
            const nextBtn = document.getElementById("next-btn");
            const submitBtn = document.getElementById("submit-btn");
            
            if (currentQuestion < quizQuestions.length - 1) {
                nextBtn.style.display = "inline-block";
                submitBtn.style.display = "none";
            } else {
                nextBtn.style.display = "none";
                submitBtn.style.display = "inline-block";
            }
        }

        function nextQuestion() {
            if (selectedAnswers[currentQuestion] !== undefined) {
                currentQuestion++;
                loadQuestion();
            } else {
                alert("يرجى اختيار إجابة");
            }
        }

        function submitQuiz() {
            if (selectedAnswers[currentQuestion] === undefined) {
                alert("يرجى اختيار إجابة");
                return;
            }

            score = 0;
            quizQuestions.forEach((question, index) => {
                if (selectedAnswers[index] === question.correct) {
                    score++;
                }
            });

            const percentage = Math.round((score / quizQuestions.length) * 100);
            alert(`نتيجتك: ${score}/${quizQuestions.length}\nالنسبة المئوية: ${percentage}%\n\nممتاز! تابع تعلمك.`);
            window.location.href = "levels.html";
        }

        loadQuestion();
    </script>
</body>
</html>
